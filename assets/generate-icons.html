<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  
  // Background gradient
  const grad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grad.addColorStop(0, '#2a1a5c');
  grad.addColorStop(0.6, '#1a0f3c');
  grad.addColorStop(1, '#0d0a1a');
  ctx.fillStyle = grad;
  ctx.roundRect(0, 0, s, s, s*0.15);
  ctx.fill();
  
  // Star symbol
  ctx.fillStyle = '#c9a227';
  ctx.font = `bold ${s*0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', s/2, s/2);
  
  // Border
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = s * 0.02;
  ctx.globalAlpha = 0.6;
  ctx.roundRect(s*0.05, s*0.05, s*0.9, s*0.9, s*0.1);
  ctx.stroke();
  ctx.globalAlpha = 1;
}

['c192', 'c512'].forEach((id, i) => {
  const canvas = document.getElementById(id);
  const size = i === 0 ? 192 : 512;
  drawIcon(canvas, size);
  
  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = canvas.toDataURL('image/png');
  document.body.appendChild(link);
  link.click();
});
</script>
</body>
</html>
